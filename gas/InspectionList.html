<!-- Inspection Round Modal -->

<div class="modal fade"
     id="inspectionRoundModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    เปิดรอบตรวจนับ

                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label>ปีงบประมาณ</label>

                    <input
                        type="number"
                        id="inspectionYear"
                        class="form-control"
                        value="2569">

                </div>

                <div class="mb-3">

                    <label>วันที่เริ่ม</label>

                    <input
                        type="date"
                        id="inspectionStart"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>วันที่สิ้นสุด</label>

                    <input
                        type="date"
                        id="inspectionEnd"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label>หมายเหตุ</label>

                    <textarea
                        id="inspectionRemark"
                        class="form-control">
                    </textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    ยกเลิก

                </button>

                <button
                    class="btn btn-primary"
                    onclick="saveInspectionRound()">

                    บันทึก

                </button>

            </div>

        </div>

    </div>

</div>
